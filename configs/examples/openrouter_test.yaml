# Meta information
name: "openrouter_test"
description: "Testing OpenRouter API with gpt-4o-mini"

# Paths to prompts
prompt:
  traits_path: "src/prompt/traits.json"
  facets_path: "src/prompt/facets.json"
  system_path: "src/prompt/system.json"

# Data settings
data:
  file_path: "data/raw/df_ipipneo_120_clusters"
  clusters: [2]
  num_participants: 10
  save_every_n: 2

# OpenRouter model settings
model:
  model_name: "gpt-4o-mini"
  provider: "openrouter"
  temperature: 0.7
  timeout: 120
  max_retries: 3
  max_completion_tokens: 4000
  # Optional: provider restrictions
  extra_body:
    allowed_providers: ["google-vertex"]
  # Rate limiting (enabled by default)
  rate_limit:
    enabled: true
    requests_per_second: 1.0
    max_bucket_size: 10

# No evolution - just test
evolution:
  algorithm: null

# Experiment settings
experiment:
  seed: 2026
  save_every_generation: true
