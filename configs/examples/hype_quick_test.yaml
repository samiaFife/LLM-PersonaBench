# Quick test config for HyPE optimization
# Run: python tools/launch_experiment.py --config=examples/hype_quick_test.yaml

name: "hype_quick_test"
description: "Quick test of HyPE optimization on cluster 2"

# Model for simulation
model:
  model_name: "minimax/minimax-m2.5:free"
  provider: "openrouter"
  temperature: 0.7
  timeout: 120
  max_retries: 3
  max_completion_tokens: 4000
  rate_limit:
    enabled: true
    requests_per_second: 1.0
    max_bucket_size: 10

# Optimization method: hype or evolution
optimization:
  method: "hype"

# Evolution settings (not used when method=hype, but required by code)
evolution:
  algorithm: null

# Data settings
data:
  file_path: "data/raw/df_ipipneo_120_clusters"
  clusters: [2]
  num_participants: 10  # Small for quick test

# Prompt paths
prompt:
  traits_path: "src/prompt/traits.json"
  facets_path: "src/prompt/facets.json"
  system_path: "src/prompt/system.json"

# Experiment settings
experiment:
  seed: 2026
  save_every_generation: false
