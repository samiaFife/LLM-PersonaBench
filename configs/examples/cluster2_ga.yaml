# Метаинформация
name: "cluster0_genetic_optimization"
description: "Оптимизация промтов для кластера 0"

# Настройки данных
data:
  file_path: "data/raw/df_ipipneo_120_clusters"
  clusters: [2]
  num_participants: 30
  save_every_n: 2

# Настройки модели
model:
  model_name: "Qwen/Qwen3-Coder-480B-A35B-Instruct" # MiniMaxAI/MiniMax-M2
  provider: "cloud"
  temperature: 0.7

# Настройки EvoPrompt
evolution:
  algorithm: "GA"  # GA или DE
  population_size: 12
  num_generations: 25
  mutation_rate: 0.15
  crossover_rate: 0.8
  selection_method: "tournament"
  
  # LLM для эволюции
  llm_for_evolution: "gpt-3.5-turbo"
  
  # Что оптимизируем
  genotype_params:
    system_formulations: true
    trait_formulations: true
    facet_formulations: true
    intensity_modifiers: false 
    ciritic_formulations: false 
    template_structure: false


# Настройки эксперимента
experiment:
  seed: 2026
  save_every_generation: true