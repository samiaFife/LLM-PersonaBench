# Метаинформация
name: "gigachat3_1_cluster_no_optimization_mean_value"
description: "Запуск без эволюционной оптимизации для кластера 1 с новыми mean_value_cluster промптами на модели GigaChat3-10B-A1.8B"

# Пути к промптам
prompt:
  traits_path: "src/prompt/mean_value_cluster/traits.json"
  facets_path: "src/prompt/mean_value_cluster/facets.json"
  system_path: "src/prompt/system.json"

# Настройки данных
data:
  file_path: "data/raw/df_ipipneo_120_clusters"
  clusters: [1]
  num_participants: 100
  save_every_n: 2

# Настройки модели
model:
  model_name: "ai-sage/GigaChat3-10B-A1.8B"
  provider: "cloud"
  temperature: 0.7
  timeout: 420
  max_retries: 1

# Настройки симуляции (без оптимизации)
simulation:
  participant_batch_size: 2

# Настройки эксперимента
experiment:
  seed: 2026
  save_every_generation: false
