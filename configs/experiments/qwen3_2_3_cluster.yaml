# Метаинформация
name: "qwen3_2_3_cluster_genetic_optimization"
description: "Оптимизация промтов для кластеров 2 b 3 с использованием модели Qwen3-235B-A22B-Instruct-2507"

# Пути к промптам (опционально). Если не указаны — используются встроенные из src.prompt
prompt:
  traits_path: "src/prompt/traits.json"   
  facets_path: "src/prompt/facets.json"  
  system_path: "src/prompt/system.json"  

# Настройки данных
data:
  file_path: "data/raw/df_ipipneo_120_clusters"
  clusters: [2, 3]
  num_participants: 100 # train(60%): 60 / test(40%): 40 
  save_every_n: 2

# Настройки модели
model:
  model_name: "Qwen/Qwen3-235B-A22B-Instruct-2507"
  provider: "cloud"
  temperature: 0.7
  timeout: 180
  max_retries: 4

# Настройки EvoPrompt
evolution:
  algorithm: "GA"  # GA или DE
  population_size: 4 # размер популяции - кол-во промптов (особей) в одном поколении
  num_generations: 4 # количество поколений - кол-во итераций эволюционного алгоритма
  mutation_rate: 0.15
  crossover_rate: 0.8
  selection_method: "tournament" # tournament, roulette
  participant_batch_size: 15   # пачка участников в модель (5/10/20); 1 — по одному
  timeout: 180
  max_retries: 4

  # LLM для эволюции
  llm_for_evolution: "Qwen/Qwen3-235B-A22B-Instruct-2507" 
  provider: "cloud"
  temperature: 0.7
  
  # Что оптимизируем
  genotype_params:
    role_definition: true
    trait_formulations: true
    facet_formulations: true
    intensity_modifiers: false 
    critic_formulations: true 
    template_structure: false


# Настройки эксперимента
experiment:
  seed: 2026
  save_every_generation: true